# ============ NAT 转发规则 ============

# 1. 单端口转发 - HTTPS 流量转发
[[rules]]
type = "single"
sport = 10443          # 本机监听端口
dport = 443            # 目标服务端口
domain = "example.com" # 目标域名或 IP 地址
protocol = "all"       # 协议: all, tcp 或 udp
ip_version = "ipv4"    # IP 版本: ipv4, ipv6 或 all
comment = "转发 HTTPS 到 example.com"

# 2. 端口段转发 - 批量游戏端口
[[rules]]
type = "range"
port_start = 20000     # 起始端口
port_end = 20100       # 结束端口（含）
domain = "game.example.com"
protocol = "tcp"       # 仅 TCP 协议
ip_version = "all"     # 同时支持 IPv4 和 IPv6
comment = "游戏服务器端口段"

# 3. UDP 专用转发 - DNS 服务
[[rules]]
type = "single"
sport = 5353           # 本机 DNS 端口
dport = 53             # 目标 DNS 端口
domain = "8.8.8.8"     # 也可以直接使用 IP 地址
protocol = "udp"       # 仅 UDP 协议
ip_version = "ipv4"
comment = "DNS 查询转发"

# ============ 本地重定向规则 ============

# 4. 单端口重定向到本机服务
[[rules]]
type = "redirect"
sport = 8080           # 外部访问端口
dport = 3128           # 本机实际服务端口
protocol = "all"
ip_version = "ipv4"
comment = "代理服务端口重定向"

# 5. 端口段重定向到本机
[[rules]]
type = "redirect"
sport = 30001          # 起始端口
sport_end = 30100      # 结束端口
dport = 45678          # 本机目标端口
protocol = "tcp"
ip_version = "all"
comment = "批量端口重定向到本机"

# ============ 防火墙过滤规则 (Drop) ============

# 6. 阻止特定 IPv4 地址访问
[[rules]]
type = "drop"
chain = "input"                    # 链类型: input 或 forward
src_ip = "180.213.132.211"        # 源 IP 地址
protocol = "all"                   # 协议: all, tcp 或 udp
comment = "阻止恶意 IP 访问"

# 7. 阻止 IPv6 网段访问
[[rules]]
type = "drop"
chain = "input"
src_ip = "240e:328:1301::/48"     # IPv6 网段
protocol = "all"
comment = "阻止 IPv6 网段访问"

# 8. 阻止特定端口（如 SSH）
[[rules]]
type = "drop"
chain = "input"
dst_port = 22                      # 目标端口
protocol = "tcp"
comment = "阻止 SSH 端口访问"

# 9. 阻止端口范围
[[rules]]
type = "drop"
chain = "forward"
dst_port = 1000                    # 起始端口
dst_port_end = 2000                # 结束端口
protocol = "tcp"
comment = "阻止转发到端口范围 1000-2000"

# 10. 组合过滤：特定IP访问特定端口
[[rules]]
type = "drop"
chain = "input"
src_ip = "192.168.1.0/24"         # 源 IP 网段
dst_port = 3306                    # 目标端口 (MySQL)
protocol = "tcp"
comment = "阻止内网访问 MySQL"

# ============ 高级场景示例 ============

# 11. 强制 IPv6 转发
[[rules]]
type = "single"
sport = 9001
dport = 9090
domain = "ipv6.example.com"
protocol = "all"
ip_version = "ipv6"    # 仅使用 IPv6 进行转发
comment = "IPv6 专用服务"

# 12. 双栈支持示例 - 自动选择 IPv4/IPv6
[[rules]]
type = "single"
sport = 10080
dport = 80
domain = "dual-stack.example.com"  # 域名同时有 A 和 AAAA 记录
protocol = "tcp"
ip_version = "all"     # 根据客户端 IP 版本自动选择
comment = "双栈 Web 服务"
